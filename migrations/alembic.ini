# Alembic configuration file for finup-price-tracker

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current working directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to pytz.timezone
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field of the revision file
# (template fname e.g. %(rev)s_add_new_table.py)
# truncate_slug_len = 40

# set to 'true' to run the environment during
# the 'upgrade' process
# this is generally asserted by alembic
# as there is no need to run them during downgrade
# always_compare_type = false

# compare type in autogenerate mode
# compare_servers_default = true

# run script before migrations
# before_migration_script =

# run script after migrations
# after_migration_script =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
